{% extends 'base.html' %}

{% block title %}
{{ object.title }}
{% endblock %}

{% block heading %}
📖 Detalle del Post
{% endblock %}

{% block content %}

<div class="post-detail">

    <h2>{{ object.title }}</h2>

    <p class="post-content">
        {{ object.content }}
    </p>

    <a href="{% url 'core:post_list' %}" class="btn">
        ← Volver a Posts
    </a>

</div>

{% endblock %}
