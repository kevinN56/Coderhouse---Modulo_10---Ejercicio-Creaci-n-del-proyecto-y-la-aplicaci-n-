{% extends 'base.html' %}

{% block title %}Eliminar Post{% endblock %}

{% block content %}
<h1>Eliminar Post</h1>

<p>¿Seguro que deseas eliminar "{{ object.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirmar</button>
</form>

<a href="{% url 'core:post_list' %}">Cancelar</a>
{% endblock %}
