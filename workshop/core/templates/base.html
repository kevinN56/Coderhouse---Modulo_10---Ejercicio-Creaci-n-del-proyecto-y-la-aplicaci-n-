{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <!-- Título dinámico que puede ser sobrescrito por las plantillas hijas -->
    <title>{% block title %}Blog{% endblock %}</title>

    <!-- Carga de la hoja de estilos principal -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- Menú de navegación común para todo el sitio -->
    <nav>
        <a href="{% url 'core:home' %}">Inicio</a>
        <a href="{% url 'core:post_list' %}">Posts</a>
    </nav>

    <hr>

    <!-- Bloque principal donde cada plantilla hija inserta su contenido -->
    {% block content %}
    {% endblock %}

</body>

</html>
